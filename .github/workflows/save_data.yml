name: Save Market Data
on:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Update JSON File
        run: |
          echo '${{ github.event.client_payload.products }}' > market_data.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add market_data.json
          git commit -m "تحديث تلقائي للمنتجات من لوحة التحكم" || exit 0
          git push
