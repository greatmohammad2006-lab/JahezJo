name: Save Market Data
on:
  workflow_dispatch:
    inputs:
      products:
        description: 'بيانات المنتجات'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Update JSON File
        run: |
          echo '${{ github.event.inputs.products }}' > market_data.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add market_data.json
          git commit -m "تحديث تلقائي للمنتجات من لوحة التحكم" || exit 0
          git push
